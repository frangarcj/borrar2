name: Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'

      - name: Adding Known Hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy and Start Application
        run: |
          ssh ubuntu@${{ secrets.SSH_HOST }} "if [ ! -d 'nodeapp' ]; then \
              git clone https://github.com/ualcnsa/nodeapp.git; \
            else \
              cd nodeapp && git stash && git fetch --all && git reset --hard origin/main && git pull origin main; \
            fi"  
          ssh ubuntu@${{ secrets.SSH_HOST }} "if pgrep node; then forever stopall; fi" 
          ssh ubuntu@${{ secrets.SSH_HOST }} "cd nodeapp && npm install" 
          ssh ubuntu@${{ secrets.SSH_HOST }} "cd nodeapp && forever start src/main.js"
